<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
        <title>Pong Game</title>
        <link rel="stylesheet" href="pong.css">
    </head>

    <body>
        <div class="container">
            <div class="header">
                <h1>PONG</h1>
                <div class="controls-info">
                    <p><strong>Desktop:</strong> W/S or ↑/↓ | <strong>Mobile:</strong> Touch to move</p>
                </div>
            </div>
            
            <div class="game-container">
                <canvas id="board"></canvas>
                <div id="gameOverlay" class="game-overlay hidden">
                    <div class="overlay-content">
                        <h2 id="overlayTitle"></h2>
                        <p id="overlayText"></p>
                        <button id="restartBtn">Play Again</button>
                    </div>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span>Player 1 (W/S)</span>
                    <span id="player1-wins">Wins: 0</span>
                </div>
                <div class="stat-item">
                    <span>Player 2 (↑/↓)</span>
                    <span id="player2-wins">Wins: 0</span>
                </div>
                <button id="pauseBtn" class="control-btn">Pause (Space)</button>
            </div>

            <div id="touchControls" class="touch-controls hidden">
                <div class="touch-zone left-zone" id="player1Touch">P1</div>
                <div class="touch-zone right-zone" id="player2Touch">P2</div>
            </div>
        </div>

        <script src="pong.js"></script>
    </body>
</html>
