<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Math Generator</title>
    <meta name="copyright" content="Eduardo Souza Rodrigues">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="description"
        content="Practice mental math with random problems. Available in English, Portuguese, and Spanish.">
</head>

<body>
    <select class="lang-selector" id="langSelector">
        <option value="en">English</option>
        <option value="pt">Português</option>
        <option value="es">Español</option>
    </select>

    <div class="container">
        <div class="header">
            <h1 class="title" id="title">Mental Math Generator</h1>
            <p class="subtitle" id="subtitle">Practice quick mental calculations</p>
        </div>

        <table class="stats-table" cellpadding="0" cellspacing="0">
            <tr>
                <td>
                    <span class="stat-value success-text" id="correctCount">0</span>
                    <span class="stat-label" id="correctLabel">Correct</span>
                </td>
                <td>
                    <span class="stat-value" id="totalCount">0</span>
                    <span class="stat-label" id="totalLabel">Total</span>
                </td>
                <td>
                    <span class="stat-value danger-text" id="wrongCount">0</span>
                    <span class="stat-label" id="wrongLabel">Wrong</span>
                </td>
            </tr>
        </table>

        <div class="problem" id="problem">Click "New Problem" to start</div>

        <div class="answer-section">
            <input type="number" class="answer-input" id="answerInput" placeholder="Your answer">
            <button class="btn btn-primary btn-submit" id="submitBtn">Submit</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="newProblemBtn">New Problem</button>
            <button class="btn" id="skipBtn">Skip</button>
            <button class="btn" id="resetBtn">Reset</button>
        </div>

        <div class="settings">
            <div class="settings-row">
                <div class="settings-inline">
                    <label id="rangeLabel">Number Range</label>
                    <select id="rangeSelect">
                        <option value="10">1-10</option>
                        <option value="50">1-50</option>
                        <option value="100" selected>1-100</option>
                        <option value="500">1-500</option>
                        <option value="1000">1-1000</option>
                    </select>
                </div>
                <div class="settings-inline">
                    <label id="termsLabel">Terms</label>
                    <select id="termsSelect">
                        <option value="2" selected>2 terms</option>
                        <option value="3">3 terms</option>
                        <option value="4">4 terms</option>
                    </select>
                </div>
                <div class="settings-inline">
                    <label id="negativeLabel">Negative Numbers</label>
                    <select id="negativeSelect">
                        <option value="false" selected>Positive only</option>
                        <option value="true">Allow negative</option>
                    </select>
                </div>
            </div>
            <div class="settings-row">
                <label id="operationsLabel">Operations</label>
                <div class="operations">
                    <button class="op-btn active" data-op="+" id="addBtn">+</button>
                    <button class="op-btn active" data-op="-" id="subBtn">−</button>
                    <button class="op-btn active" data-op="*" id="mulBtn">×</button>
                    <button class="op-btn" data-op="/" id="divBtn">÷</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
