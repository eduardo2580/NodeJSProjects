<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <link rel="stylesheet" href="breakout.css">
</head>
<body>
    <div id="game">
        <div class="hud">
            <div class="hud-item" id="scoreLabel">Score: 0</div>
            <div class="hud-item" id="levelLabel">Level: 1</div>
            <div class="hud-item" id="livesLabel">Lives: 3</div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="board"></canvas>
            <div class="message" id="statusMessage">Use arrow keys or drag/touch to move the paddle.</div>
        </div>

        <div class="touch-controls">
            <button id="leftBtn" class="control-button" aria-label="Move left">◀</button>
            <button id="rightBtn" class="control-button" aria-label="Move right">▶</button>
        </div>
    </div>

    <script src="breakout.js"></script>
</body>
</html>
